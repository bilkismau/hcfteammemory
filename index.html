<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory de l'équipe ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:    #0a0820;
    --purple-1:   #6c3fc9;
    --purple-2:   #8b5cf6;
    --blue-1:     #3b6ff5;
    --blue-2:     #60a5fa;
    --accent:     #c084fc;
    --gold:       #fbbf24;
    --green:      #34d399;
    --card-back:  #1e1650;
    --card-shine: #2d2080;
    --text-main:  #f0eaff;
    --text-sub:   #a78bfa;
    --radius:     14px;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100%; font-family: 'DM Sans', sans-serif; }

  body {
    min-height: 100vh;
    background: var(--bg-deep);
    overflow-x: hidden;
  }

  /* Background */
  .bg-layer {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 15% 10%,  rgba(108,63,201,0.5) 0%, transparent 55%),
      radial-gradient(ellipse 60% 80% at 85% 90%,  rgba(59,111,245,0.45) 0%, transparent 55%),
      radial-gradient(ellipse 40% 40% at 55% 45%,  rgba(139,92,246,0.18) 0%, transparent 65%),
      var(--bg-deep);
    animation: bgPulse 14s ease-in-out infinite alternate;
  }
  @keyframes bgPulse {
    0%   { filter: hue-rotate(0deg)  brightness(1); }
    100% { filter: hue-rotate(18deg) brightness(1.1); }
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(139,92,246,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(139,92,246,0.07) 1px, transparent 1px);
    background-size: 38px 38px;
  }
  .orb {
    position: fixed; border-radius: 50%; filter: blur(90px);
    opacity: 0.22; pointer-events: none; z-index: 0;
    animation: orbFloat linear infinite;
  }
  .orb-1 { width:380px;height:380px;background:var(--purple-1);top:-80px;left:-80px;animation-duration:22s; }
  .orb-2 { width:480px;height:480px;background:var(--blue-1);bottom:-130px;right:-80px;animation-duration:27s;animation-direction:alternate-reverse; }
  .orb-3 { width:220px;height:220px;background:var(--accent);top:42%;left:58%;animation-duration:17s;animation-delay:-5s; }
  @keyframes orbFloat {
    0%,100%{ transform:translate(0,0) scale(1); }
    33%    { transform:translate(28px,-36px) scale(1.04); }
    66%    { transform:translate(-18px,28px) scale(0.96); }
  }

  /* Layout */
  #app {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    padding: 0 10px 60px;
  }

  /* Header */
  header {
    width: 100%; max-width: 1100px;
    padding: 28px 0 18px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }

  .badge {
    display:inline-flex;align-items:center;gap:7px;
    background:linear-gradient(135deg,rgba(108,63,201,0.3),rgba(59,111,245,0.25));
    border:1px solid rgba(192,132,252,0.3);
    border-radius:999px;padding:4px 15px 4px 8px;
    font-size:0.72rem;font-weight:600;color:var(--accent);
    letter-spacing:0.08em;text-transform:uppercase;
    animation:fadeDown 0.6s ease both;
  }
  .badge-dot { width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent); }

  h1 {
    font-family:'Syne',sans-serif;
    font-size:clamp(1.8rem,4.5vw,3rem);
    font-weight:800;color:var(--text-main);
    letter-spacing:-0.03em;text-align:center;line-height:1.1;
    animation:fadeDown 0.7s 0.1s ease both;
  }
  h1 span {
    background:linear-gradient(135deg,var(--accent),var(--blue-2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .subtitle { font-size:0.88rem;color:var(--text-sub);animation:fadeDown 0.7s 0.2s ease both; }

  /* Stats */
  .stats-bar {
    display:flex;align-items:center;gap:9px;flex-wrap:wrap;justify-content:center;
    animation:fadeDown 0.7s 0.3s ease both;
  }
  .stat-pill {
    display:flex;align-items:center;gap:7px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(192,132,252,0.2);
    backdrop-filter:blur(10px);
    border-radius:999px;padding:7px 16px;
    color:var(--text-main);font-size:0.83rem;font-weight:500;
    min-width:105px;justify-content:center;
    transition:border-color 0.3s;
  }
  .stat-pill:hover { border-color:rgba(192,132,252,0.5); }
  .si { width:15px;height:15px;opacity:0.7;flex-shrink:0; }
  .sv { font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:var(--accent); }
  .sl { color:var(--text-sub);font-size:0.78rem; }

  #resetBtn {
    display:flex;align-items:center;gap:6px;
    background:linear-gradient(135deg,var(--purple-1),var(--blue-1));
    border:none;border-radius:999px;padding:8px 20px;
    color:#fff;font-size:0.84rem;font-weight:600;
    font-family:'DM Sans',sans-serif;cursor:pointer;
    transition:transform 0.15s,box-shadow 0.15s,filter 0.15s;
    box-shadow:0 4px 18px rgba(108,63,201,0.45);
  }
  #resetBtn:hover { transform:scale(1.06) translateY(-1px);box-shadow:0 8px 28px rgba(108,63,201,0.65);filter:brightness(1.1); }
  #resetBtn svg { width:13px;height:13px; }

  /* Progress */
  .progress-wrap {
    width:100%;max-width:1100px;padding:0 4px 4px;
    animation:fadeDown 0.7s 0.4s ease both;
  }
  .progress-label {
    font-size:0.73rem;color:var(--text-sub);margin-bottom:5px;
    display:flex;justify-content:space-between;
  }
  .progress-track { height:4px;background:rgba(255,255,255,0.07);border-radius:999px;overflow:hidden; }
  .progress-fill {
    height:100%;
    background:linear-gradient(90deg,var(--purple-2),var(--blue-2));
    border-radius:999px;width:0%;
    transition:width 0.5s cubic-bezier(0.4,0,0.2,1);
    box-shadow:0 0 10px var(--purple-2);
  }

  /* Grid */
  #gameGrid {
    display:grid;gap:9px;width:100%;max-width:1100px;
    grid-template-columns:repeat(5,1fr);
    animation:fadeUp 0.8s 0.55s ease both;
  }
  @media(min-width:480px) { #gameGrid{grid-template-columns:repeat(6,1fr);gap:10px;} }
  @media(min-width:640px) { #gameGrid{grid-template-columns:repeat(8,1fr);gap:11px;} }
  @media(min-width:860px) { #gameGrid{grid-template-columns:repeat(10,1fr);gap:12px;} }

  /* Card */
  .card-wrap { perspective:900px;aspect-ratio:3/4; }
  .card-inner {
    position:relative;width:100%;height:100%;
    transform-style:preserve-3d;
    transition:transform 0.55s cubic-bezier(0.4,0,0.2,1);
    border-radius:var(--radius);
  }
  .card-inner.flipped,.card-inner.matched { transform:rotateY(180deg); }

  .card-face {
    position:absolute;inset:0;border-radius:var(--radius);
    backface-visibility:hidden;-webkit-backface-visibility:hidden;
  }

  /* Back */
  .card-back-face {
    background:linear-gradient(145deg,var(--card-shine),var(--card-back));
    border:1.5px solid rgba(139,92,246,0.28);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;overflow:hidden;
    box-shadow:0 5px 18px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.09);
    transition:transform 0.12s,box-shadow 0.12s,border-color 0.2s;
  }
  .card-back-face::before {
    content:'';position:absolute;inset:0;
    background:repeating-conic-gradient(rgba(139,92,246,0.06) 0% 25%,transparent 0% 50%) 0 0/15px 15px;
  }
  .card-back-face::after {
    content:'';position:absolute;top:-60%;left:-60%;width:220%;height:220%;
    background:conic-gradient(from 180deg,transparent 60%,rgba(192,132,252,0.1) 80%,transparent 100%);
    animation:shimmer 4.5s linear infinite;
  }
  @keyframes shimmer { from{transform:rotate(0)}to{transform:rotate(360deg)} }
  .card-back-face:hover {
    border-color:rgba(192,132,252,0.65);
    box-shadow:0 10px 28px rgba(108,63,201,0.55),inset 0 1px 0 rgba(255,255,255,0.15);
    transform:translateY(-2px) scale(1.03);
  }
  .card-q {
    font-family:'Syne',sans-serif;
    font-size:clamp(1rem,2.5vw,1.55rem);
    font-weight:800;color:rgba(192,132,252,0.4);
    position:relative;z-index:1;
    text-shadow:0 0 18px rgba(192,132,252,0.35);
  }

  /* Front */
  .card-front-face {
    transform:rotateY(180deg);
    background:linear-gradient(145deg,#1a1060,#14103e);
    border:1.5px solid rgba(139,92,246,0.38);
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:5px 4px;gap:4px;
    box-shadow:0 5px 18px rgba(0,0,0,0.4);
  }
  .card-avatar {
    width:clamp(22px,4.5vw,38px);height:clamp(22px,4.5vw,38px);
    border-radius:50%;
    background:linear-gradient(135deg,var(--purple-1),var(--blue-1));
    display:flex;align-items:center;justify-content:center;
    font-family:'Syne',sans-serif;font-weight:800;
    font-size:clamp(0.48rem,1.3vw,0.78rem);color:#fff;flex-shrink:0;
  }
  .card-name {
    font-family:'Syne',sans-serif;
    font-size:clamp(0.42rem,1.3vw,0.68rem);
    font-weight:700;color:var(--text-main);
    text-align:center;line-height:1.15;word-break:break-word;
  }

  /* Matched */
  .card-inner.matched .card-front-face {
    background:linear-gradient(145deg,#0d3d2a,#082a1d);
    border-color:rgba(52,211,153,0.48);
  }
  .card-inner.matched .card-avatar { background:linear-gradient(135deg,#059669,#34d399); }
  .card-inner.matched .card-name   { color:#6ee7b7; }

  .matched-glow { animation:matchGlow 0.7s ease-out; }
  @keyframes matchGlow {
    0%  { box-shadow:0 0 0 0 rgba(52,211,153,0.85); }
    40% { box-shadow:0 0 26px 13px rgba(52,211,153,0.35); }
    100%{ box-shadow:0 0 0 0 rgba(52,211,153,0); }
  }

  /* Shake */
  .shake { animation:shake 0.45s cubic-bezier(0.36,0.07,0.19,0.97); }
  @keyframes shake {
    0%,100%{ transform:rotateY(180deg) translateX(0); }
    20%    { transform:rotateY(180deg) translateX(-5px); }
    40%    { transform:rotateY(180deg) translateX(5px); }
    60%    { transform:rotateY(180deg) translateX(-4px); }
    80%    { transform:rotateY(180deg) translateX(3px); }
  }

  /* Win overlay */
  #winOverlay {
    display:none;position:fixed;inset:0;
    background:rgba(5,3,18,0.78);backdrop-filter:blur(14px);
    z-index:200;align-items:center;justify-content:center;
  }
  #winOverlay.show { display:flex; }
  .win-modal {
    background:linear-gradient(145deg,#1a1060,#0e0c30);
    border:1.5px solid rgba(192,132,252,0.32);
    border-radius:26px;padding:48px 40px;text-align:center;
    box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 80px rgba(108,63,201,0.28),inset 0 1px 0 rgba(255,255,255,0.07);
    max-width:360px;width:90%;
    animation:modalPop 0.45s cubic-bezier(0.175,0.885,0.32,1.275) both;
  }
  @keyframes modalPop {
    from{transform:scale(0.6) translateY(40px);opacity:0;}
    to  {transform:scale(1) translateY(0);opacity:1;}
  }
  .trophy { font-size:3.8rem;margin-bottom:8px;display:block;animation:trophyBounce 0.6s 0.3s ease both; }
  @keyframes trophyBounce {
    0%  { transform:scale(0) rotate(-18deg); }
    60% { transform:scale(1.2) rotate(4deg); }
    100%{ transform:scale(1) rotate(0); }
  }
  .win-title {
    font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:800;
    background:linear-gradient(135deg,var(--accent),var(--gold));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    margin-bottom:6px;
  }
  .win-sub { font-size:0.88rem;color:var(--text-sub);margin-bottom:26px; }
  .win-stats { display:flex;gap:11px;justify-content:center;margin-bottom:30px; }
  .win-stat-box {
    background:rgba(255,255,255,0.05);border:1px solid rgba(192,132,252,0.2);
    border-radius:15px;padding:13px 20px;min-width:105px;
  }
  .wsn { font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;color:var(--accent);display:block;line-height:1; }
  .wsl { font-size:0.7rem;color:var(--text-sub);margin-top:4px;display:block;text-transform:uppercase;letter-spacing:0.06em; }
  #playAgainBtn {
    background:linear-gradient(135deg,var(--purple-1),var(--blue-1));
    border:none;border-radius:999px;padding:12px 36px;
    color:#fff;font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:700;
    cursor:pointer;transition:transform 0.15s,box-shadow 0.15s,filter 0.15s;
    box-shadow:0 6px 22px rgba(108,63,201,0.5);
  }
  #playAgainBtn:hover { transform:scale(1.06);box-shadow:0 12px 34px rgba(108,63,201,0.7);filter:brightness(1.1); }

  /* Confetti */
  .confetti {
    position:fixed;top:-20px;border-radius:3px;opacity:0;pointer-events:none;z-index:300;
    animation:confettiFall var(--dur) var(--delay) ease-out forwards;
  }
  @keyframes confettiFall {
    0%  { opacity:1;transform:translateY(0) rotate(0deg) scaleX(1); }
    80% { opacity:1; }
    100%{ opacity:0;transform:translateY(105vh) rotate(calc(var(--spin)*720deg)) scaleX(var(--flip)); }
  }

  /* Utility */
  @keyframes fadeDown {
    from{opacity:0;transform:translateY(-14px);}to{opacity:1;transform:translateY(0);}
  }
  @keyframes fadeUp {
    from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}
  }
  .card-wrap { opacity:0;animation:cardReveal 0.35s ease both; }
  @keyframes cardReveal {
    from{opacity:0;transform:scale(0.78);}to{opacity:1;transform:scale(1);}
  }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div id="app">
  <header>
    <div class="badge"><div class="badge-dot"></div>Jeu de l'équipe</div>
    <h1>Memory <span>de l'Équipe</span></h1>
    <p class="subtitle">Retrouvez les 23 paires — bonne chance !&nbsp;🎯</p>

    <div class="stats-bar">
      <div class="stat-pill">
        <svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <span class="sv" id="pairsDisplay">0/23</span>
        <span class="sl">paires</span>
      </div>
      <div class="stat-pill">
        <svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="12" x2="15" y2="14"/>
        </svg>
        <span class="sv" id="timerDisplay">0:00</span>
      </div>
      <div class="stat-pill">
        <svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/>
          <path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/>
        </svg>
        <span class="sv" id="movesDisplay">0</span>
        <span class="sl">coups</span>
      </div>
      <button id="resetBtn" onclick="resetGame()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
        </svg>
        Rejouer
      </button>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span>Progression</span>
        <span id="progressLabel">0 / 23 paires trouvées</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </header>

  <div id="gameGrid"></div>
</div>

<div id="winOverlay">
  <div class="win-modal">
    <span class="trophy">🏆</span>
    <div class="win-title">Félicitations !</div>
    <p class="win-sub">Tu as trouvé toutes les paires de l'équipe&nbsp;!</p>
    <div class="win-stats">
      <div class="win-stat-box"><span class="wsn" id="finalMoves">—</span><span class="wsl">Coups</span></div>
      <div class="win-stat-box"><span class="wsn" id="finalTime">—</span><span class="wsl">Temps</span></div>
    </div>
    <button id="playAgainBtn" onclick="resetGame()">🎮 Rejouer</button>
  </div>
</div>

<script>
const TEAM = [
  "Steve","Sébastien","Williams","Younghoon","Jin",
  "Baptiste","Nicolas","Sébastien Z.","Hortense","Bilkis",
  "Kadiatou","Inès","Thomas","Guillaume","Quentin",
  "Marie","Arthur","Ethan","Enzo","Koth",
  "Guillaume N.","Sylvie","Céline"
];
const TOTAL = TEAM.length;

let flipped=[],matchedCount=0,moves=0,seconds=0,timerRef=null,canFlip=true;

function initials(n){
  return n.trim().split(/\s+/).map(w=>w[0].toUpperCase()).slice(0,2).join('');
}
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function buildGrid(){
  const grid=document.getElementById('gameGrid');
  grid.innerHTML='';
  const pairs=shuffle([...TEAM,...TEAM]);
  pairs.forEach((name,idx)=>{
    const wrap=document.createElement('div');
    wrap.className='card-wrap';
    wrap.style.animationDelay=`${0.55+idx*0.016}s`;
    wrap.innerHTML=`
      <div class="card-inner" id="ci-${idx}" data-name="${name}">
        <div class="card-face card-front-face">
          <div class="card-avatar">${initials(name)}</div>
          <div class="card-name">${name}</div>
        </div>
        <div class="card-face card-back-face" onclick="flipCard(${idx})">
          <span class="card-q">?</span>
        </div>
      </div>`;
    grid.appendChild(wrap);
  });
}

function flipCard(idx){
  if(!canFlip)return;
  const el=document.getElementById(`ci-${idx}`);
  if(!el||el.classList.contains('flipped')||el.classList.contains('matched'))return;
  if(flipped.length>=2)return;
  if(!timerRef&&moves===0&&flipped.length===0)startTimer();
  el.classList.add('flipped');
  flipped.push(idx);
  if(flipped.length===2){
    moves++;
    document.getElementById('movesDisplay').textContent=moves;
    canFlip=false;
    const[a,b]=flipped;
    const nA=document.getElementById(`ci-${a}`).dataset.name;
    const nB=document.getElementById(`ci-${b}`).dataset.name;
    if(nA===nB){
      setTimeout(()=>{
        [a,b].forEach(i=>{
          const c=document.getElementById(`ci-${i}`);
          c.classList.remove('flipped');
          c.classList.add('matched');
          c.closest('.card-wrap').classList.add('matched-glow');
        });
        matchedCount++;
        updateProgress();
        flipped=[];canFlip=true;
        if(matchedCount===TOTAL)setTimeout(showWin,450);
      },360);
    }else{
      setTimeout(()=>{
        [a,b].forEach(i=>{
          const c=document.getElementById(`ci-${i}`);
          c.classList.add('shake');
          setTimeout(()=>c.classList.remove('shake','flipped'),470);
        });
        flipped=[];canFlip=true;
      },720);
    }
  }
}

function updateProgress(){
  const pct=(matchedCount/TOTAL)*100;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=`${matchedCount} / ${TOTAL} paires trouvées`;
  document.getElementById('pairsDisplay').textContent=`${matchedCount}/${TOTAL}`;
}

function startTimer(){
  timerRef=setInterval(()=>{
    seconds++;
    const m=Math.floor(seconds/60),s=seconds%60;
    document.getElementById('timerDisplay').textContent=`${m}:${String(s).padStart(2,'0')}`;
  },1000);
}

function showWin(){
  clearInterval(timerRef);timerRef=null;
  const m=Math.floor(seconds/60),s=seconds%60;
  document.getElementById('finalMoves').textContent=moves;
  document.getElementById('finalTime').textContent=`${m}:${String(s).padStart(2,'0')}`;
  document.getElementById('winOverlay').classList.add('show');
  launchConfetti();
}

function launchConfetti(){
  const colors=['#c084fc','#8b5cf6','#60a5fa','#34d399','#fbbf24','#f472b6','#a78bfa','#38bdf8'];
  for(let i=0;i<130;i++){
    const el=document.createElement('div');
    el.className='confetti';
    const color=colors[Math.floor(Math.random()*colors.length)];
    const size=5+Math.random()*11;
    const spin=Math.random()>0.5?1:-1;
    const flip=Math.random()>0.5?1:-1;
    const circle=Math.random()>0.6;
    el.style.cssText=`
      left:${Math.random()*100}vw;
      width:${circle?size:size*0.55}px;height:${size}px;
      background:${color};
      border-radius:${circle?'50%':'2px'};
      --dur:${2.2+Math.random()*2}s;
      --delay:${Math.random()*1.3}s;
      --spin:${spin};--flip:${flip};
    `;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),5000);
  }
}

function resetGame(){
  clearInterval(timerRef);timerRef=null;
  flipped=[];matchedCount=0;moves=0;seconds=0;canFlip=true;
  document.getElementById('movesDisplay').textContent='0';
  document.getElementById('timerDisplay').textContent='0:00';
  document.getElementById('pairsDisplay').textContent=`0/${TOTAL}`;
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('progressLabel').textContent=`0 / ${TOTAL} paires trouvées`;
  document.getElementById('winOverlay').classList.remove('show');
  buildGrid();
}

buildGrid();
</script>
</body>
